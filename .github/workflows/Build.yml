name: Build Dunit OS

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write  # нужно для создания релизов

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            nasm \
            lld \
            xorriso \
            mtools \
            git

      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
          components: rust-src, llvm-tools-preview

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            kernel/target
            userspace/system_apps/plank/target
            userspace/system_apps/terminal/target
            userspace/system_apps/file_manager/target
            userspace/system_apps/text_editor/target
            userspace/system_apps/settings/target
            userspace/system_apps/system_monitor/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Limine
        uses: actions/cache@v4
        with:
          path: limine
          key: limine-v8-binary

      - name: Build ISO
        run: bash build_iso.sh

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}-${{ github.sha }}
          name: "Dunit OS build #${{ github.run_number }}"
          body: |
            Автосборка из коммита ${{ github.sha }}
            Ветка: ${{ github.ref_name }}
          files: build/microkernel.iso
          prerelease: true
